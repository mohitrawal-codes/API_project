<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Place Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8; --surface: #fffdf8; --ink: #1a1612; --ink2: #5a5248;
      --accent: #c4602a; --green: #2a7c6f; --border: #e0d8cc;
      --shadow: 0 2px 24px rgba(26,22,18,0.08);
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; font-size: 15px; min-height: 100vh; }
    .page { max-width: 780px; margin: 0 auto; padding: 0 20px 60px; }
    .site-header { padding: 48px 0 24px; text-align: center; }
    .site-title { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem,5.5vw,3.4rem); color: var(--ink); letter-spacing: -0.02em; line-height: 1.1; }
    .site-title em { color: var(--accent); font-style: italic; }
    .site-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--ink2); letter-spacing: 0.22em; text-transform: uppercase; margin-top: 8px; }
    .search-wrap { display: flex; gap: 10px; margin-top: 26px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 8px 8px 8px 20px; box-shadow: var(--shadow); transition: border-color 0.2s; }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .search-input { flex: 1; border: none; outline: none; background: transparent; font-family: 'Outfit', sans-serif; font-size: 1rem; color: var(--ink); }
    .search-input::placeholder { color: #b5afa7; }
    .search-btn { background: var(--accent); color: white; border: none; border-radius: 9px; padding: 11px 22px; font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s; }
    .search-btn:hover { background: #ae5224; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { background: #c9bfb5; cursor: not-allowed; }
    .loader-wrap { text-align: center; padding: 52px 0; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-msg { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--ink2); letter-spacing: 0.1em; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .nf-card { background: var(--surface); border: 1.5px solid #e8d8c8; border-radius: 16px; padding: 34px 24px; margin-top: 26px; text-align: center; box-shadow: var(--shadow); animation: fadeUp 0.4s ease both; }
    .nf-icon { font-size: 2.6rem; margin-bottom: 10px; }
    .nf-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }
    .nf-msg { font-size: 0.88rem; color: var(--ink2); line-height: 1.6; max-width: 400px; margin: 0 auto; }
    .nf-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink2); margin: 18px 0 10px; }
    .sug-row { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; }
    .sug-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 100px; padding: 8px 18px; font-family: 'Outfit', sans-serif; font-size: 0.84rem; font-weight: 500; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s; }
    .sug-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff5ef; }
    .retry-btn { background: none; border: none; color: var(--ink2); font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; margin-top: 16px; display: inline-block; }
    .retry-btn:hover { color: var(--accent); }
    .place-hero { text-align: center; padding: 28px 0 18px; border-bottom: 1.5px solid var(--border); margin-bottom: 24px; }
    .place-name { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,4.5vw,2.8rem); letter-spacing: -0.02em; line-height: 1.1; }
    .place-region { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--ink2); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 5px; }
    .time-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .pill-dark  { background: var(--ink); color: white; border-radius: 100px; padding: 7px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; letter-spacing: 0.07em; font-weight: 500; }
    .pill-light { background: var(--surface); border: 1.5px solid var(--border); color: var(--ink2); border-radius: 100px; padding: 7px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; letter-spacing: 0.05em; }
    .pill-green { background: var(--green); color: white; border-radius: 100px; padding: 5px 13px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.07em; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full { grid-column: 1 / -1; }
    @media(max-width: 560px) { .grid2 { grid-template-columns: 1fr; } .full { grid-column: 1; } }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow); }
    .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; padding-bottom: 11px; border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink2); }
    .w-big { display: flex; align-items: center; gap: 14px; margin-bottom: 15px; }
    .w-emoji { font-size: 2.9rem; line-height: 1; }
    .w-temp { font-family: 'Playfair Display', serif; font-size: 2.9rem; line-height: 1; color: var(--accent); }
    .w-cond { font-size: 0.88rem; color: var(--ink2); margin-top: 3px; text-transform: capitalize; }
    .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .w-stat { background: var(--bg); border-radius: 9px; padding: 9px 12px; }
    .w-sl { font-family: 'IBM Plex Mono', monospace; font-size: 0.54rem; color: var(--ink2); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }
    .w-sv { font-size: 0.92rem; font-weight: 600; color: var(--ink); }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .info-row:last-child { border-bottom: none; }
    .ik { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--ink2); letter-spacing: 0.07em; flex-shrink: 0; }
    .iv { font-size: 0.85rem; font-weight: 500; color: var(--ink); text-align: right; }
    .facts { list-style: none; }
    .facts li { padding: 8px 0 8px 18px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--ink); line-height: 1.5; position: relative; }
    .facts li:last-child { border-bottom: none; }
    .facts li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-family: 'IBM Plex Mono', monospace; }
    .fade-up { animation: fadeUp 0.45s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .wiki-text { font-size: 0.88rem; line-height: 1.7; color: var(--ink); }
    .wiki-text p { margin-bottom: 10px; } .wiki-text p:last-child { margin-bottom: 0; }
    .wiki-link { display: inline-block; margin-top: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--accent); text-decoration: none; letter-spacing: 0.08em; border-bottom: 1px solid currentColor; padding-bottom: 1px; }
    .wiki-link:hover { opacity: 0.75; }
  </style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <h1 class="site-title">Place <em>Explorer</em></h1>
    <p class="site-sub">Weather · Location · History · Live Time</p>
    <div class="search-wrap" id="searchWrap">
      <input type="text" id="placeInput" class="search-input" placeholder="Enter any place — city, country, region…" autocomplete="off"/>
      <button class="search-btn" id="searchBtn" onclick="explore()">Explore</button>
    </div>
  </header>

  <div id="loader" class="loader-wrap" style="display:none">
    <div class="spinner"></div>
    <div class="load-msg" id="loadMsg">SEARCHING…</div>
  </div>

  <div id="errorBox"></div>
  <div id="results" style="display:none"></div>

</div>
<script>
  // ============================================================
  //  PASTE YOUR OPENWEATHERMAP KEY ON THE LINE BELOW
  // ============================================================
  const OWM_KEY = "025f47508f4a66fc1594cf262eff8211";
  // ============================================================

  let clockTZ = 'UTC', clockTimer = null;
  function startClock(tz) {
    clockTZ = tz || 'UTC';
    if (clockTimer) clearInterval(clockTimer);
    function tick() {
      const now = new Date();
      const fmt = (opts) => { try { return now.toLocaleString('en-GB', { timeZone: clockTZ, ...opts }); } catch { return now.toLocaleString('en-GB', opts); } };
      document.getElementById('liveClock').textContent = fmt({ hour:'2-digit', minute:'2-digit', second:'2-digit' });
      document.getElementById('liveDate').textContent  = fmt({ weekday:'long', year:'numeric', month:'long', day:'numeric' });
      document.getElementById('liveTZ').textContent    = clockTZ.replace(/_/g,' ');
    }
    tick(); clockTimer = setInterval(tick, 1000);
  }

  function wEmoji(code) {
    if (!code) return '🌡️';
    if (code >= 200 && code < 300) return '⛈️';
    if (code >= 300 && code < 400) return '🌦️';
    if (code >= 500 && code < 600) return '🌧️';
    if (code >= 600 && code < 700) return '❄️';
    if (code >= 700 && code < 800) return '🌫️';
    if (code === 800) return '☀️';
    if (code === 801) return '🌤️';
    if (code === 802) return '⛅';
    if (code >= 803) return '☁️';
    return '🌡️';
  }

  function setMsg(m) { document.getElementById('loadMsg').textContent = m; }
  function showLoader(v) { document.getElementById('loader').style.display = v ? 'block' : 'none'; }

  async function getGeo(place) {
    const r = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(place)}&limit=1&appid=${OWM_KEY}`);
    const d = await r.json();
    if (!r.ok || !d.length) throw new Error('Place not found. Check spelling and try again.');
    return d[0];
  }

  async function getWeather(place) {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(place)}&appid=${OWM_KEY}&units=metric`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.message || 'Weather error');
    return d;
  }

  async function getTimezone(lat, lon) {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&timezone=auto&forecast_days=1&hourly=temperature_2m`);
    const d = await r.json();
    return d.timezone || 'UTC';
  }

  async function getCountryInfo(code) {
    try {
      const r = await fetch(`https://restcountries.com/v3.1/alpha/${code}`);
      const d = await r.json();
      const c = d[0];
      return {
        population: c.population?.toLocaleString(),
        area: c.area ? c.area.toLocaleString() + ' km²' : null,
        currency: c.currencies ? Object.values(c.currencies).map(x => `${x.name} (${x.symbol||''})`).join(', ') : null,
        capital: c.capital?.[0] || null,
        subregion: c.subregion || c.region || null,
      };
    } catch { return {}; }
  }

  async function getWiki(name, country) {
    try {
      const search = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name+' '+country)}&format=json&origin=*&srlimit=1`);
      const sd = await search.json();
      const title = sd?.query?.search?.[0]?.title;
      if (!title) return null;
      const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=true&explaintext=true&titles=${encodeURIComponent(title)}&format=json&origin=*`);
      const wd = await res.json();
      const page = Object.values(wd?.query?.pages || {})[0];
      if (!page?.extract) return null;
      const paras = page.extract.split('\n').filter(p => p.trim().length > 60).slice(0, 3);
      return { text: paras, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}` };
    } catch { return null; }
  }

  const SUGGESTIONS = ['Tokyo, Japan','Paris, France','Mumbai, India','New York, USA','Cairo, Egypt','Sydney, Australia'];
  function pickSuggestions(exclude) {
    return SUGGESTIONS.filter(s => !s.toLowerCase().includes(exclude.toLowerCase())).slice(0,3);
  }
  function searchSuggestion(p) { document.getElementById('placeInput').value = p; explore(); }

  function renderResults({ geo, weather, tz, country, wiki }) {
    const infoRows = [
      ['Country',     geo.country],
      ['State',       geo.state],
      ['Coordinates', `${geo.lat.toFixed(4)}° N, ${geo.lon.toFixed(4)}° E`],
      ['Timezone',    tz],
      ['Population',  country.population],
      ['Area',        country.area],
      ['Currency',    country.currency],
      ['Capital',     country.capital],
      ['Region',      country.subregion],
    ].filter(([,v]) => v && v !== 'N/A');

    const weatherHTML = weather ? `
      <div class="w-big">
        <div class="w-emoji">${wEmoji(weather.weather[0].id)}</div>
        <div>
          <div class="w-temp">${Math.round(weather.main.temp)}°C</div>
          <div class="w-cond">${weather.weather[0].description}</div>
        </div>
      </div>
      <div class="w-grid">
        ${[
          ['Feels Like', `${Math.round(weather.main.feels_like)}°C`],
          ['Humidity',   `${weather.main.humidity}%`],
          ['Wind',       `${Math.round(weather.wind.speed*3.6)} km/h`],
          ['Pressure',   `${weather.main.pressure} hPa`],
          ['Visibility', weather.visibility ? `${(weather.visibility/1000).toFixed(1)} km` : '—'],
          ['Clouds',     `${weather.clouds.all}%`],
        ].map(([l,v]) => `<div class="w-stat"><div class="w-sl">${l}</div><div class="w-sv">${v}</div></div>`).join('')}
      </div>` : `<p style="color:var(--ink2);font-size:.84rem;line-height:1.65">Weather data unavailable for this location.</p>`;

    const wikiHTML = wiki
      ? `<div class="wiki-text">${wiki.text.map(p=>`<p>${p}</p>`).join('')}</div>
         <a class="wiki-link" href="${wiki.url}" target="_blank">Read full article on Wikipedia →</a>`
      : `<p style="color:var(--ink2);font-size:.84rem">No Wikipedia article found for this place.</p>`;

    document.getElementById('results').innerHTML = `
      <div class="fade-up">
        <div class="place-hero">
          <div class="place-name">${geo.name}</div>
          <div class="place-region">${[geo.state, geo.country].filter(Boolean).join(', ')}</div>
          <div class="time-bar">
            <span class="pill-dark" id="liveClock">--:--:--</span>
            <span class="pill-light" id="liveDate">---</span>
            <span class="pill-green" id="liveTZ">UTC</span>
          </div>
        </div>
        <div class="grid2">
          <div class="card">
            <div class="card-head">🌤 Current Weather</div>
            ${weatherHTML}
          </div>
          <div class="card">
            <div class="card-head">📍 Location Info</div>
            ${infoRows.map(([k,v])=>`<div class="info-row"><span class="ik">${k}</span><span class="iv">${v}</span></div>`).join('')}
          </div>
          <div class="card full">
            <div class="card-head">📖 About This Place</div>
            ${wikiHTML}
          </div>
        </div>
      </div>`;

    document.getElementById('results').style.display = 'block';
    startClock(tz);
  }

  async function explore() {
    const place = document.getElementById('placeInput').value.trim();
    if (!place) {
      const w = document.getElementById('searchWrap');
      w.classList.add('shake');
      setTimeout(() => w.classList.remove('shake'), 400);
      document.getElementById('placeInput').focus();
      return;
    }

    document.getElementById('results').style.display = 'none';
    document.getElementById('errorBox').innerHTML = '';
    showLoader(true);
    document.getElementById('searchBtn').disabled = true;

    try {
      setMsg('FINDING LOCATION…');
      const geo = await getGeo(place);

      setMsg('FETCHING DATA…');
      const [weather, tz, country, wiki] = await Promise.allSettled([
        getWeather(place),
        getTimezone(geo.lat, geo.lon),
        getCountryInfo(geo.country),
        getWiki(geo.name, geo.country),
      ]);

      renderResults({
        geo,
        weather: weather.status === 'fulfilled' ? weather.value : null,
        tz:      tz.status      === 'fulfilled' ? tz.value      : 'UTC',
        country: country.status === 'fulfilled' ? country.value : {},
        wiki:    wiki.status    === 'fulfilled' ? wiki.value    : null,
      });

    } catch(e) {
      document.getElementById('errorBox').innerHTML = `
        <div class="nf-card">
          <div class="nf-icon">🗺️</div>
          <div class="nf-title">Place not found</div>
          <p class="nf-msg">${e.message}</p>
          <div class="nf-label">Try one of these:</div>
          <div class="sug-row">
            ${pickSuggestions(place).map(s=>`<button class="sug-btn" onclick="searchSuggestion('${s}')">📍 ${s}</button>`).join('')}
          </div>
          <button class="retry-btn" onclick="document.getElementById('placeInput').select();document.getElementById('placeInput').focus()">← Try a different name</button>
        </div>`;
    } finally {
      showLoader(false);
      document.getElementById('searchBtn').disabled = false;
    }
  }

  document.getElementById('placeInput').addEventListener('keydown', e => { if (e.key === 'Enter') explore(); });
</script>
</body>
</html>
